# Railway builds the single app image (Nginx + PHP-FPM).
# Add a MySQL plugin in the Railway dashboard, then set variables on the app service:
#   APP_ENV=prod
#   APP_DEBUG=0
#   APP_SECRET=<random-string>
#   DATABASE_URL=mysql://USER:PASSWORD@HOST:PORT/DATABASE?serverVersion=8.0.32&charset=utf8mb4

build:
  builder: dockerfile
  dockerfilePath: ./Dockerfile

deploy:
  numReplicas: 1
  restartPolicyType: ON_FAILURE
  healthcheckPath: /
